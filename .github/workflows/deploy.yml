name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # déclenche le déploiement à chaque push sur main
  workflow_dispatch: # permet le déclenchement manuel depuis GitHub

# Permissions requises pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; annule les runs en attente si un nouveau push arrive
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Pas de build — le jeu est du HTML/CSS/JS statique pur
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Déploie tout le dépôt (hors .github/)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
